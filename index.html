<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="birthday.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
    <title>Birthday wish</title>
</head>

<body>
    <div id="header">
        <h1>Today is Hitesh's birthday 💖</h1>
        <img id="bff-img" src="images/Professional Image.jpg">
        <h2 id="bday-age">23 years old</h2>
        <h4 id="bday-date">26 . 11 . 2002</h4>
    </div>
    <div class="gift-section">
        <h2 class="gift-title">Here's how happy I am for you today 😎</h2>
        <h3 class="gift-hint">(Hover over the Gift)</h3>
        <div class="gift-img" id="gift-img-happy"></div>
    </div>
    <div class="gift-section">
        <h2 class="gift-title">How people react when you enter the room 😍</h2>
        <div class="gift-img" id="gift-img-hot"></div>
    </div>
    <div class="gift-section">
        <h2 class="gift-title">This one's for you, my friend 🥂</h2>
        <div class="gift-img" id="gift-img-cheers"></div>
    </div>
    <p id="footer">Want to create your own Bikthday GIFt site? Take <a href="https://scrimba.
com/learn/htmlandcss" target="_blank">this HTML & CSS course.</a></p>
</body>

</html>
